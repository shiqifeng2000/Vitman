  window.getSessions = async () => {
    let timestamp = Date.now();
    fetch(`/sessions`, {
      method: "get",
      headers: {
        "Content-Type": "application/json",
      },
      // body: JSON.stringify({
      //   peer: btoa(JSON.stringify(d)),
      // }),
    })
      .then((res) => res.json())
      .then((body) => {
        if (body.success) {
          if (sessions.length == body.sessions.vitmans.length) {
            let ls_diff = false;
            let rs_diff = false;
            for (let ls of Object.keys(sessions)) {
              if (!body.sessions.vitmans.hasOwnProperty(ls)) {
                ls_diff = true;
                break;
              }
            }
            if (!ls_diff) {
              for (let rs of Object.keys(body.sessions.vitmans)) {
                if (!sessions.hasOwnProperty(rs)) {
                  rs_diff = true;
                  break;
                }
              }
            }
            if (ls_diff || rs_diff) {
              sessions = body.sessions.vitmans;
              let keys = Object.keys(sessions);
              document.getElementById("sessions").innerHTML = keys.join(", ");
              if (keys.length) {
                targetInput.value = keys[0];
              }
            }
          } else {
            sessions = body.sessions.vitmans;
            let keys = Object.keys(sessions);
            document.getElementById("sessions").innerHTML = keys.join(", ");
            if (keys.length) {
              targetInput.value = keys[0];
            }
          }
        }
      })
      .catch(log);
  }

    target = targetInput.value;
    let localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: false,
    });
    var el0 = document.createElement("audio");
    el0.autoplay = true;
    el0.controls = true;
    el0.muted = true;
    el0.srcObject = localStream;
    document.getElementById("localAudios").appendChild(el0);

    var el = document.createElement("video");

    el.controls = true;
    let mediaStream = new MediaStream();
    el.srcObject = mediaStream;
    document.getElementById("remoteVideos").appendChild(el);

    let localtrack = new Promise((res) => {
      localStream.getTracks().forEach(track => {
        track.contentHint = "detail";
        pc.addTrack(track, localStream);
        res(track.id);
      });
    });

    let localtrack_id = await localtrack;
    pc.ontrack = function (event) {
      if (event.track.id != localtrack_id) {
        console.log("ontrack", event)
        mediaStream.addTrack(event.track);
      }

    let localCandidates = [];
    let candidatePromise = new Promise((res) => {
      pc.onicecandidate = (e) => {
        if (e.candidate === null) {
          // document.getElementById("localSessionDescription").value = btoa(
          //   JSON.stringify(pc.localDescription)
          // );
          // console.log(pc.localDescription);
          localCandidates.push(null);
          res(localCandidates);
        } else {
          let message = {};
          message.candidate = e.candidate.candidate;
          message.sdpMid = e.candidate.sdpMid;
          message.sdpMLineIndex = e.candidate.sdpMLineIndex;
          message.usernameFragment = e.candidate.usernameFragment;
          localCandidates.push(message);
        }
        console.log(e);
      };
      setTimeout(() => { res(localCandidates) }, 1000);
    });


    // Offer to receive 1 audio, and 1 video track
    pc.addTransceiver("video", { direction: "recvonly" });
    pc.addTransceiver("audio", { direction: "sendrecv" });
    let sendChannel = pc.createDataChannel('command')
    sendChannel.onclose = () => console.log('sendChannel has closed')
    sendChannel.onopen = () => console.log('sendChannel has opened')
    // sendChannel.onmessage = (e) => {
    //   dataInput.value = new TextDecoder("utf-8").decode(e.data);
    // }
    messageBtn.onclick = () => {
      if (dataInput.value) {
        sendChannel.send(dataInput.value);
      }
    }
    const messageBtn1 = document.getElementById("messager1");
    messageBtn1.onclick = () => {
      sendChannel.send("你好");
    }
    const messageBtn2 = document.getElementById("messager2");
    messageBtn2.onclick = () => {
      sendChannel.send("介绍下自己");
    }


    let d = await pc.createOffer();
    console.log(d.sdp);
    await pc.setLocalDescription(d);
    await candidatePromise;

    let timestamp = Date.now()
    // const md5Hash = md5(`${timestamp}&${TOKEN}`).toString();
    let body = await fetch(`/start`, {
      method: "post",
      headers: {
        Accept: "application/json, text/plain, */*",
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // sockets: 3,
        candidates: localCandidates,
        peer: btoa(JSON.stringify(d)),
        target: target ? target : null
      }),
    })
      .then((res) => res.json())
      .catch(log);

    if (body.success) {
      try {
        let sdp = JSON.parse(atob(body.data));
        channelId = body.vid;
        document.getElementById("channel").innerHTML = channelId;
        await pc.setRemoteDescription(new RTCSessionDescription(sdp));
        console.log(sdp);

        // for (let candidate of body.candidates) {
        //   pc.addIceCandidate(candidate);
        // }
        subscribeBtn.disabled = true;
      } catch (e) {
        alert(e);
      }
    }


    if (!window.pc) {
      window.pc = pc;
    } else {
      window.pc.close();
    }
  }
